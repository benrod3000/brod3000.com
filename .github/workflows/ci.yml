name: CI
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Type-check (JSDoc + checkJs)
        run: npx -y typescript --noEmit -p jsconfig.json

      - name: HTML validate
        run: npx -y html-validate "*.html"

      - name: Broken link check
        # Reddit returns 403 to automated requests (bot protection).
        # The profile links work fine in a browser — this is a known false positive.
        run: |
          npx -y http-server . -p 8080 --silent &
          sleep 3
          npx -y linkinator http://localhost:8080 --recurse --silent --skip reddit.com

      - name: Lighthouse budget
        # Replaces deprecated treosh/lighthouse-ci-action@v11.
        # Runs Lighthouse against localhost and checks budget assertions inline.
        run: |
          npx -y lighthouse http://localhost:8080 --output=json --quiet --chrome-flags="--headless --no-sandbox" > /tmp/lh-report.json
          node -e "
            const j = JSON.parse(require('fs').readFileSync('/tmp/lh-report.json','utf8'));
            const a = j.audits;
            const lcp = a['largest-contentful-paint']?.numericValue || 0;
            const items = a['resource-summary']?.details?.items || [];
            const script = items.find(i => i.resourceType === 'script')?.transferSize || 0;
            const image = items.find(i => i.resourceType === 'image')?.transferSize || 0;
            const total = items.find(i => i.resourceType === 'total')?.transferSize || 0;
            const failures = [];
            if (lcp > 7500) failures.push('LCP ' + (lcp/1000).toFixed(1) + 's > 7.5s budget');
            if (script/1024 > 200) failures.push('Script ' + (script/1024).toFixed(0) + 'KB > 200KB budget');
            if (image/1024 > 400) failures.push('Image ' + (image/1024).toFixed(0) + 'KB > 400KB budget');
            if (total/1024 > 900) failures.push('Total ' + (total/1024).toFixed(0) + 'KB > 900KB budget');
            if (failures.length) { console.error('BUDGET FAILURES:'); failures.forEach(f => console.error('  - ' + f)); process.exit(1); }
            // CLS is skipped on localhost — non-blocking CSS load causes
            // inflated measurements (0.5+) that don't appear in production
            // (verified 0.012 in Google Search Console).
            const cls = a['cumulative-layout-shift']?.numericValue || 0;
            console.log('Lighthouse budget: PASS (LCP ' + (lcp/1000).toFixed(1) + 's, CLS ' + cls.toFixed(3) + ' (unchecked), script ' + (script/1024).toFixed(0) + 'KB)');
          "
