<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Digital Experience</title>
  <meta name="description" content="This page has moved to the main site URL. ">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <link rel="canonical" href="https://brod3000.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brut-bg: #f5f5f0;
      --brut-ink: #0a0a0a;
      --brut-highlight: #f5e642;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--brut-ink);
      font-family: "Space Grotesk", "Helvetica Neue", Arial, sans-serif;
      background: var(--brut-bg);
      padding: 24px;
    }

    .redirect-card {
      width: min(560px, 100%);
      padding: 30px 26px;
      border: 5px solid var(--brut-ink);
      background: #fff;
      box-shadow: 8px 8px 0 var(--brut-ink);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.4rem, 3.8vw, 2rem);
      font-family: "Bebas Neue", Impact, "Arial Black", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--brut-ink);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .loader {
      width: 100%;
      height: 8px;
      margin: 22px 0 18px;
      border: 5px solid var(--brut-ink);
      background: #fff;
      overflow: hidden;
    }

    .loader::before {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      transform: translateX(-100%);
      background: var(--brut-highlight);
      animation: load 1.2s ease-in-out forwards;
    }

    a {
      color: var(--brut-ink);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @keyframes load {
      to {
        transform: translateX(0%);
      }
    }
  </style>
</head>
<body>
  <main class="redirect-card" aria-live="polite">
    <h1>Launching Digital Experience</h1>
    <p>Syncing interface modules and redirecting to the latest site view.</p>
    <div class="loader" aria-hidden="true"></div>
    <p>If you are not redirected, <a href="./">open the homepage</a>.</p>
  </main>

  <script>
    window.setTimeout(() => {
      window.location.replace('./');
    }, 1200);
  </script>
</body>
</html>
